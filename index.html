<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор паролей</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1c1c1e;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 400px;
            margin: 40px auto auto auto;
            background: #2c2c2e;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            text-align: center;
            border-radius: 8px;
            border: 1px solid #48484a;
            background-color: #1c1c1e;
            color: #ffffff;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        button {
            background-color: #2481cc;
            color: #ffffff;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        button:active {
            background-color: #1a6199;
        }
        .options {
            text-align: left;
            margin-bottom: 20px;
            background: #3a3a3c;
            padding: 15px;
            border-radius: 10px;
        }
        .option-row {
            display: flex;
            justify-content:space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .option-row:last-child {
            margin-bottom: 0;
        }
        input[type="number"] {
            width: 60px;
            padding: 5px;
            background: #1c1c1e;
            color: white;
            border: 1px solid#48484a;
            border-radius: 4px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Генератор Паролей</h2>
    <input type="text" id="passwordDisplay" readonly placeholder="Нажмите Сгенерировать">

    <div class="options">
        <div class="option-row">
            <label for="length">Длина пароля:</label>
            <input type="number" id="length" value="12" min="4" max="30">
        </div>
        <div class="option-row">
            <label for="numbers">Включать цифры (0-9)</label>
            <input type="checkbox" id="numbers" checked>
        </div>
        <div class="option-row">
            <label for="symbols">Включать спецсимволы (!@#$)</label>
            <input type="checkbox" id="symbols" checked>
        </div>
    </div>

    <button onclick="generatePassword()">Сгенерировать</button>
</div>

<script>
    // Безопасная инициализация Telegram WebApp
    try {
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();
            // Подстроим цвета под тему Телеграма, если мы внутри него
            if (tg.themeParams.bg_color) {
                document.body.style.backgroundColor = tg.themeParams.bg_color;
                document.body.style.color = tg.themeParams.text_color;
            }
        }
    } catch (e) {
        console.log("Запущено вне Telegram");
    }

    function
generatePassword() {
        const length = parseInt(document.getElementById('length').value) || 12;
        const includeNumbers = document.getElementById('numbers').checked;
        const includeSymbols = document.getElementById('symbols').checked;

        let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
        if (includeNumbers) chars += "0123456789";
        if (includeSymbols) chars += "!@#$%^&()_+~`|}{[]:;?><,./-=";

        let password = "";
        for (let i = 0; i < length; i++) {
            const randomIndex = Math.floor(Math.random() chars.length);
            password += chars[randomIndex];
        }

        document.getElementById('passwordDisplay').value = password;
    }
</script>
</body>
</html>
