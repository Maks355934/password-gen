<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор паролей</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: auto;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        input[type="text"] {
            width: 90%;
            padding: 10px;
            font-size: 18px;
            text-align: center;
            border-radius: 5px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
        }
        button {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        .options {
            text-align: left;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Генератор Паролей</h2>
    <input type="text" id="passwordDisplay" readonly placeholder="Здесь будет пароль">

    <div class="options">
        <label><input type="number" id="length" value="12" min="4" max="30" style="width: 50px;"> Длина</label><br><br>
        <label><input type="checkbox" id="numbers" checked> Цифры (0-9)</label><br>
        <label><input type="checkbox" id="symbols" checked> Спецсимволы (!@#$%)</label>
    </div>

    <button onclick="generatePassword()">Сгенерировать</button>
</div>

<script>
    // Инициализация Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.ready();

    function generatePassword() {
        const length = document.getElementById('length').value;
        const includeNumbers = document.getElementById('numbers').checked;
        const includeSymbols = document.getElementById('symbols').checked;

        let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
        if (includeNumbers) chars += "0123456789";
        if (includeSymbols) chars += "!@#$%^&()_+~`|}{[]:;?><,./-=";

        let password = "";
        for (let i = 0; i < length; i++) {
            const randomIndex = Math.floor(Math.random() chars.length);
            password += chars[randomIndex];
        }

        document.getElementById('passwordDisplay').value = password;
    }
</script>
</body>
</html>
