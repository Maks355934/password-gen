<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор</title>
    <style>
        body { font-family: sans-serif; background: #1c1c1e; color: #fff; text-align: center; padding: 20px; }
        .box { max-width: 350px; margin: 50px auto; background: #2c2c2e; padding: 20px; border-radius: 12px; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; font-size: 18px; text-align: center; border-radius: 6px; border: 1px solid #48484a; background: #1c1c1e; color: #fff; box-sizing: border-box; }
        button { background: #2481cc; color: #fff; border: none; padding: 12px; font-size: 16px; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h3>Генератор паролей</h3>
    <input type="text" id="result" readonly placeholder="Нажми кнопку">
    <button onclick="gen()">Сгенерировать</button>
</div>
<script>
function gen() {
    var chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&";
    var pass = "";
    for (var i = 0; i < 12; i++) {
        pass += chars.charAt(Math.floor(Math.random()*chars.length));
    }
    document.getElementById("result").value = pass;
}
</script>
</body>
</html>
